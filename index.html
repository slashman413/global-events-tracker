<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Events 3D Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #00000f;
    color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #globe-container { width: 100vw; height: 100vh; }

  /* ── Header ── */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 18px 28px;
    background: linear-gradient(180deg, rgba(0,0,15,0.95) 0%, transparent 100%);
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 10;
    pointer-events: none;
  }

  .header-icon { font-size: 28px; }

  .header-title {
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, #60a5fa, #a78bfa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-sub {
    font-size: 11.5px;
    color: #50507a;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .live-badge {
    margin-left: auto;
    pointer-events: all;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.25);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: 12.5px;
    color: #34d399;
    font-weight: 600;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #34d399;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Info Card ── */
  .info-card {
    position: fixed;
    top: 50%;
    right: 28px;
    transform: translateY(-50%);
    width: 330px;
    background: rgba(6, 6, 18, 0.94);
    border: 1px solid rgba(96, 165, 250, 0.2);
    border-radius: 22px;
    padding: 26px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    z-index: 30;
    display: none;
    box-shadow:
      0 0 0 1px rgba(96,165,250,0.08),
      0 24px 48px rgba(0,0,0,0.7),
      0 0 80px rgba(96,165,250,0.05);
  }

  .info-card.visible {
    display: block;
    animation: cardIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-50%) scale(0.92) translateX(16px); }
    to   { opacity: 1; transform: translateY(-50%) scale(1)    translateX(0);    }
  }

  .card-close {
    position: absolute;
    top: 16px; right: 18px;
    background: rgba(255,255,255,0.06);
    border: none;
    color: #60607a;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .card-close:hover { background: rgba(255,255,255,0.12); color: #c0c0e0; }

  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .card-category {
    font-size: 12px;
    font-weight: 600;
    color: #8080b0;
    letter-spacing: 0.5px;
  }

  .card-severity {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 9px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .sev-critical { background: rgba(239,68,68,0.18);  color: #f87171; border: 1px solid rgba(239,68,68,0.3);  }
  .sev-high     { background: rgba(245,158,11,0.18); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .sev-medium   { background: rgba(234,179,8,0.18);  color: #facc15; border: 1px solid rgba(234,179,8,0.3);  }
  .sev-low      { background: rgba(16,185,129,0.18); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

  .card-title {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.38;
    color: #f0f0ff;
    margin-bottom: 12px;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 14px;
  }

  .card-meta-row {
    font-size: 12px;
    color: #50507a;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-meta-row .icon { font-size: 13px; }

  .card-divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.05);
    margin: 14px 0;
  }

  .card-summary {
    font-size: 13.5px;
    color: #9090b8;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: #818cf8;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    padding: 9px 18px;
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 99px;
    transition: all 0.18s;
    background: rgba(99,102,241,0.06);
  }
  .card-link:hover {
    background: rgba(99,102,241,0.14);
    border-color: rgba(99,102,241,0.5);
    color: #a5b4fc;
    transform: translateY(-1px);
  }

  /* ── Legend ── */
  .legend {
    position: fixed;
    bottom: 28px;
    left: 28px;
    background: rgba(6,6,18,0.82);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px 20px;
    backdrop-filter: blur(16px);
    z-index: 10;
  }

  .legend-title {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #383858;
    margin-bottom: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 12px;
    color: #70709a;
    margin-bottom: 7px;
  }
  .legend-item:last-child { margin-bottom: 0; }

  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed;
    background: rgba(6,6,18,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 12.5px;
    color: #c0c0e0;
    pointer-events: none;
    z-index: 40;
    display: none;
    backdrop-filter: blur(8px);
    max-width: 220px;
  }

  /* ── Credit ── */
  .credit {
    position: fixed;
    bottom: 16px;
    right: 24px;
    font-size: 10.5px;
    color: #28284a;
    z-index: 10;
  }
  .credit a { color: #38386a; text-decoration: none; }
  .credit a:hover { color: #6060a0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🌍</div>
  <div>
    <div class="header-title">Global Events 3D Tracker</div>
    <div class="header-sub">Real-time world event monitoring · Click any marker for details</div>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span id="event-count">—</span> Active Events
  </div>
</div>

<div id="globe-container"></div>

<!-- Info Card -->
<div class="info-card" id="info-card">
  <button class="card-close" onclick="closeCard()">×</button>
  <div class="card-top">
    <div class="card-category" id="card-cat"></div>
    <div class="card-severity" id="card-sev"></div>
  </div>
  <div class="card-title"    id="card-title"></div>
  <div class="card-meta">
    <div class="card-meta-row"><span class="icon">📍</span><span id="card-loc"></span></div>
    <div class="card-meta-row"><span class="icon">🕐</span><span id="card-time"></span></div>
    <div class="card-meta-row"><span class="icon">📰</span><span id="card-src"></span></div>
  </div>
  <hr class="card-divider">
  <div class="card-summary" id="card-summary"></div>
  <a class="card-link" id="card-link" href="#" target="_blank" rel="noopener">Read full story ↗</a>
</div>

<!-- Hover tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Legend -->
<div class="legend">
  <div class="legend-title">Event Type</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff2222;color:#ff2222"></div>Military / Conflict</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff8800;color:#ff8800"></div>Natural Disaster</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00aaff;color:#00aaff"></div>Technology</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22cc44;color:#22cc44"></div>Environment</div>
  <div class="legend-item"><div class="legend-dot" style="background:#aa44ff;color:#aa44ff"></div>Politics / Economy</div>
</div>

<div class="credit">
  Powered by <a href="https://globe.gl" target="_blank">globe.gl</a> &nbsp;·&nbsp;
  Data: <a href="https://www.gdeltproject.org" target="_blank">GDELT</a> / RSS Feeds
</div>

<script src="https://unpkg.com/globe.gl@2.32.1/dist/globe.gl.min.js"></script>
<script>

// ── Agent 2: Test Data (5 global events with geocoordinates) ─────────────────
// Replace this with fetch('events_data.json') after running fetch_events.py
const TEST_EVENTS = [
  {
    id: "tw001",
    title: "Taiwan Strait Military Exercises Escalate",
    summary: "The People's Liberation Army launched its largest-ever joint naval and air force exercises encircling Taiwan, deploying over 40 warships and 100+ aircraft. The US Seventh Fleet moved the USS Ronald Reagan carrier group into the Philippine Sea in response. Regional tensions are at a decade high.",
    category: "Military",
    severity: "critical",
    source: "Reuters / BBC",
    url: "https://news.google.com/search?q=Taiwan+Strait+Military+Exercises+2026",
    timestamp: "2026-06-16T06:30:00Z",
    location: "Taiwan Strait, Asia-Pacific",
    lat: 24.5,
    lon: 120.8,
    color: "#ff2222"
  },
  {
    id: "ys001",
    title: "Yellowstone Seismic Swarm: 400+ Quakes in 48h",
    summary: "The USGS recorded over 400 minor earthquakes beneath Yellowstone National Park within 48 hours — the highest seismic activity since 2014. Scientists stress no eruption warning has been issued, but monitoring has been significantly intensified. Park facilities remain open.",
    category: "Disaster",
    severity: "medium",
    source: "USGS / AP News",
    url: "https://news.google.com/search?q=Yellowstone+seismic+swarm+2026",
    timestamp: "2026-06-15T14:00:00Z",
    location: "Yellowstone, Wyoming, USA",
    lat: 44.43,
    lon: -110.59,
    color: "#ff8800"
  },
  {
    id: "ai001",
    title: "AI Lab Announces Artificial General Intelligence",
    summary: "A prominent Silicon Valley research laboratory announced the internal achievement of AGI — a system capable of performing any intellectual task a human can. The claim awaits independent peer verification. Global markets surged: NVIDIA +12%, S&P 500 tech sector +8%. Governments worldwide called emergency AI safety summits.",
    category: "Technology",
    severity: "high",
    source: "Bloomberg / The Verge",
    url: "https://news.google.com/search?q=AI+AGI+artificial+general+intelligence+2026",
    timestamp: "2026-06-16T09:00:00Z",
    location: "San Francisco, USA",
    lat: 37.77,
    lon: -122.43,
    color: "#00aaff"
  },
  {
    id: "gz001",
    title: "Gaza Ceasefire Collapses After 3 Months",
    summary: "The three-month ceasefire in Gaza ended as airstrikes resumed in the early hours of June 16. The UN Security Council convened an emergency session. Humanitarian aid corridors have been sealed, with 2.3 million residents facing critical food and medicine shortages. Regional powers are calling for immediate negotiations.",
    category: "Military",
    severity: "critical",
    source: "Al Jazeera / BBC",
    url: "https://news.google.com/search?q=Gaza+ceasefire+2026",
    timestamp: "2026-06-16T03:15:00Z",
    location: "Gaza Strip, Middle East",
    lat: 31.35,
    lon: 34.31,
    color: "#ff2222"
  },
  {
    id: "am001",
    title: "Amazon Deforestation Breaks All Historical Records",
    summary: "Brazil's INPE satellite system detected the destruction of 12,000 km² of Amazon rainforest in just 15 days — surpassing every monthly record since monitoring began in the 1980s. President Lula has convened an emergency environmental summit in Brasília. International scientists warn of irreversible tipping points approaching for the world's largest carbon sink.",
    category: "Environment",
    severity: "high",
    source: "BBC / INPE Brazil",
    url: "https://news.google.com/search?q=Amazon+deforestation+record+2026",
    timestamp: "2026-06-15T18:00:00Z",
    location: "Amazon Basin, Brazil",
    lat: -3.47,
    lon: -62.21,
    color: "#22cc44"
  }
];

// ── Category Icons ────────────────────────────────────────────────────────────
const CAT_ICONS = {
  "Military":    "🪖",
  "Disaster":    "🌋",
  "Technology":  "🤖",
  "Environment": "🌿",
  "Politics":    "🏛",
  "General":     "📰",
};

// ── Severity config ───────────────────────────────────────────────────────────
const SEV_CONFIG = {
  "critical": { cls: "sev-critical", label: "CRITICAL" },
  "high":     { cls: "sev-high",     label: "HIGH"     },
  "medium":   { cls: "sev-medium",   label: "MEDIUM"   },
  "low":      { cls: "sev-low",      label: "LOW"      },
};

// ── Globe Init ────────────────────────────────────────────────────────────────
let globe, controls;

function initGlobe(events) {
  document.getElementById('event-count').textContent = events.length;

  globe = Globe()
    // Earth textures (CDN, no API key needed)
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
    // Atmosphere
    .showAtmosphere(true)
    .atmosphereColor('#3a5aff')
    .atmosphereAltitude(0.18)
    // Animated rings (pulse effect)
    .ringsData(events)
    .ringLat('lat')
    .ringLng('lon')
    .ringColor(d => t => colorWithAlpha(d.color, 1 - t))
    .ringMaxRadius(5)
    .ringPropagationSpeed(2.5)
    .ringRepeatPeriod(900)
    // Point markers
    .pointsData(events)
    .pointLat('lat')
    .pointLng('lon')
    .pointColor('color')
    .pointAltitude(0.025)
    .pointRadius(0.6)
    .pointResolution(16)
    // Interactions
    .onPointClick(onMarkerClick)
    .onPointHover(onMarkerHover)
    (document.getElementById('globe-container'));

  controls = globe.controls();
  controls.autoRotate      = true;
  controls.autoRotateSpeed = 0.25;
  controls.enableDamping   = true;
  controls.dampingFactor   = 0.08;
  controls.minDistance     = 150;
  controls.maxDistance     = 800;
}

function colorWithAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${Math.max(0, alpha)})`;
}

// ── Marker Interactions ───────────────────────────────────────────────────────
function onMarkerClick(d) {
  showCard(d);
  controls.autoRotate = false;
  globe.pointOfView({ lat: d.lat, lng: d.lon, altitude: 2.0 }, 1000);
}

function onMarkerHover(d, prevD) {
  document.body.style.cursor = d ? 'pointer' : 'default';
  const tip = document.getElementById('tooltip');
  if (d) {
    tip.textContent = d.title;
    tip.style.display = 'block';
  } else {
    tip.style.display = 'none';
  }
}

document.addEventListener('mousemove', e => {
  const tip = document.getElementById('tooltip');
  if (tip.style.display !== 'none') {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 36) + 'px';
  }
});

// ── Info Card ─────────────────────────────────────────────────────────────────
function showCard(d) {
  const sev = SEV_CONFIG[d.severity] || SEV_CONFIG.low;
  const icon = CAT_ICONS[d.category] || '📰';

  document.getElementById('card-cat').textContent     = `${icon} ${d.category}`;
  document.getElementById('card-sev').className       = `card-severity ${sev.cls}`;
  document.getElementById('card-sev').textContent     = sev.label;
  document.getElementById('card-title').textContent   = d.title;
  document.getElementById('card-loc').textContent     = d.location;
  document.getElementById('card-time').textContent    = formatTime(d.timestamp);
  document.getElementById('card-src').textContent     = d.source;
  document.getElementById('card-summary').textContent = d.summary;
  const _url = (() => {
    try {
      const u = new URL(d.url || '');
      if (!u.pathname || u.pathname === '/') {
        return 'https://news.google.com/search?q=' + encodeURIComponent(d.title);
      }
    } catch {}
    return d.url || '#';
  })();
  const _isSearch = _url.includes('news.google.com');
  document.getElementById('card-link').href        = _url;
  document.getElementById('card-link').textContent = _isSearch ? 'Search Google News ↗' : 'Read full story ↗';

  const card = document.getElementById('info-card');
  card.classList.remove('visible');
  void card.offsetWidth; // force reflow for animation replay
  card.classList.add('visible');
}

function closeCard() {
  document.getElementById('info-card').classList.remove('visible');
  if (controls) controls.autoRotate = true;
}

function formatTime(iso) {
  try {
    return new Date(iso).toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });
  } catch { return iso; }
}

// Click globe background = close card
document.getElementById('globe-container').addEventListener('click', e => {
  if (e.target && e.target.tagName === 'CANVAS') closeCard();
});

// ── Load Data ─────────────────────────────────────────────────────────────────
// Try to load live events_data.json first; fall back to embedded test data
fetch('events_data.json')
  .then(r => { if (!r.ok) throw new Error('no file'); return r.json(); })
  .then(data => {
    console.log(`Loaded ${data.length} events from events_data.json`);
    initGlobe(data);
  })
  .catch(() => {
    console.log('Using embedded test data (run fetch_events.py for live data)');
    initGlobe(TEST_EVENTS);
  });

</script>
</body>
</html>
